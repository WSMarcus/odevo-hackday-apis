<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>Weather API</title>
  <link
    rel="stylesheet"
    href="./style.css"
  />
  <link
    href="https://fonts.googleapis.com/css?family=Montserrat:400,700|Roboto:400,700&display=swap"
    rel="stylesheet"
  />
</head>

<body id="body">
  <h1>Weather API</h1>

  <section>
    <div class="todays-numbers">
      <p>
        <span id="shortDescription">Short description placeholder</span> | <span id="temperature">Temperature
          placeholder</span>
      </p>
    </div>
    <div class="todays-description">
      <img
        id="icon"
        src="./assets/rain.svg"
        alt="Weather icon"
      />
      <h2 id="description">Description placeholder</h2>
    </div>
  </section>

  <script
    type="text/javascript"
    src="./script.js"
  ></script>
</body>

</html>
