<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >
  <link
    rel="stylesheet"
    href="style.css"
  >
  <title>Movies API</title>
</head>

<body>
  <h1>Movies API</h1>
  <button id="openMoodPickerBtn" class="mood-picker-button">Mood Picker ▼</button>

  <div id="mood-dropdown" class="mood-dropdown hidden">
    <p>Select mood:</p>
    <button class="mood-option" data-mood="happy">😊 Happy</button>
    <button class="mood-option" data-mood="sad">😢 Sad</button>
    <button class="mood-option" data-mood="annoyed">😤 Annoyed</button>
    <button class="mood-option" data-mood="neutral">😐 Neutral</button>
  </div>

  <!-- All Movies Section -->
  <section id="movies" class="movies"></section>

  <div id="mood-result" class="mood-result hidden"></div>
  
  <!-- Modal -->
  <div id="movieModal" class="modal">
    <div class="modal-container">
      <span class="close-btn">&times;</span>
      <div id="modalContent"></div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>

</html>
